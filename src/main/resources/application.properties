spring.application.name=charity-aid
server.port=${PORT:8080}

# ── MySQL DataSource ──────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/charity_aid_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:luffy123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────────
# DEV secret — base64("charity-aid-dev-2026-spring-boot3") = 33 bytes (264 bits > 256)
# PRODUCTION: set APP_JWT_SECRET env variable to a cryptographically random 256-bit base64 value
app.jwt.secret=${APP_JWT_SECRET:Y2hhcml0eS1haWQtZGV2LTIwMjYtc3ByaW5nLWJvb3Qz}
app.jwt.expiration-ms=900000

# Base URL used for building password-reset links (override in production)
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.aid-request.high-value-threshold=${APP_AID_REQUEST_HIGH_VALUE_THRESHOLD:5000}
app.notifications.high-value-donation-threshold=${APP_HIGH_VALUE_DONATION_THRESHOLD:10000}
app.notifications.pending-reminder-hours=${APP_PENDING_REMINDER_HOURS:48}
app.notifications.pending-reminder-repeat-hours=${APP_PENDING_REMINDER_REPEAT_HOURS:24}
app.notifications.pending-reminder-check-ms=${APP_PENDING_REMINDER_CHECK_MS:3600000}
app.recurring-donations.check-ms=${APP_RECURRING_DONATIONS_CHECK_MS:3600000}

# ── Mail / Brevo SMTP ─────────────────────────────────────────
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME:changeme}
spring.mail.password=${BREVO_SMTP_KEY:changeme}
spring.mail.from=${MAIL_FROM:noreply@charityaid.org}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Actuator ─────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
# Disable mail health check until real SMTP credentials are configured
management.health.mail.enabled=false
