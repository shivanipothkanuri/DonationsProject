<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beneficiaries — CharityAid</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav id="mainNav"></nav>
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold mb-0">👤 Beneficiaries</h4>
    <button class="btn btn-success" onclick="openModal()">+ Register Beneficiary</button>
  </div>
  <!-- Search -->
  <div class="input-group mb-3" style="max-width:400px">
    <input type="text" class="form-control" id="searchInput" placeholder="Search by name…">
    <button class="btn btn-outline-success" onclick="loadBeneficiaries()">Search</button>
    <button class="btn btn-outline-secondary" onclick="clearSearch()">Clear</button>
  </div>
  <!-- Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-success">
            <tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Address</th><th>Status</th><th>Registered</th><th>Actions</th></tr>
          </thead>
          <tbody id="bRows"><tr><td colspan="8" class="text-center text-muted p-4">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="pagination" class="mt-3 d-flex justify-content-center"></div>
</div>

<!-- Register/Edit Modal -->
<div class="modal fade" id="bModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title" id="bModalTitle">Register Beneficiary</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="bId">
        <div class="mb-3">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-control" id="bName" required maxlength="100">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number *</label>
          <input type="tel" class="form-control" id="bPhone" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email <small class="text-muted">(optional)</small></label>
          <input type="email" class="form-control" id="bEmail">
        </div>
        <div class="mb-3">
          <label class="form-label">Residential Address *</label>
          <textarea class="form-control" id="bAddress" rows="2" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" onclick="saveBeneficiary()">Save</button>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  requireAuth();
  const allowedRoles = ['STAFF','CASE_MANAGER','ADMINISTRATOR'];
  if (!allowedRoles.includes(getRole())) window.location.href = '/dashboard.html';
  buildNav('mainNav');

  async function loadBeneficiaries(page = 0) {
    const search = document.getElementById('searchInput').value.trim();
    let url = `/beneficiaries?page=${page}&size=15`;
    if (search) url += `&search=${encodeURIComponent(search)}`;
    try {
      const res = await api('GET', url);
      renderTable(res.data.content || []);
      renderPagination(res.data.totalPages, page);
    } catch(e) { showError(e.message); }
  }

  function renderTable(rows) {
    if (!rows.length) {
      document.getElementById('bRows').innerHTML = '<tr><td colspan="8" class="text-center text-muted p-4">No beneficiaries found.</td></tr>';
      return;
    }
    window._beneficiaryMap = {};
    rows.forEach(b => { window._beneficiaryMap[b.beneficiaryId] = b; });
    const canEdit = ['STAFF','ADMINISTRATOR'].includes(getRole());
    document.getElementById('bRows').innerHTML = rows.map(b => `
      <tr>
        <td>${b.beneficiaryId}</td>
        <td class="fw-semibold">${b.fullName}</td>
        <td>${b.phoneNumber}</td>
        <td>${b.emailAddress || '—'}</td>
        <td>${b.residentialAddress}</td>
        <td><span class="badge ${b.beneficiaryStatus==='ACTIVE'?'bg-success':'bg-secondary'}">${b.beneficiaryStatus}</span></td>
        <td>${new Date(b.registrationDate).toLocaleDateString()}</td>
        <td>
          ${canEdit ? `<button class="btn btn-sm btn-outline-primary" onclick="editBeneficiary(${b.beneficiaryId})">Edit</button>` : ''}
          ${getRole()==='ADMINISTRATOR' && b.beneficiaryStatus==='ACTIVE' ?
            `<button class="btn btn-sm btn-outline-danger ms-1" onclick="deactivate(${b.beneficiaryId})">Deactivate</button>` : ''}
        </td>
      </tr>`).join('');
  }

  function renderPagination(total, current) {
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '<nav><ul class="pagination">';
    for (let i = 0; i < total; i++)
      html += `<li class="page-item${i===current?' active':''}"><button class="page-link" onclick="loadBeneficiaries(${i})">${i+1}</button></li>`;
    document.getElementById('pagination').innerHTML = html + '</ul></nav>';
  }

  function openModal() {
    document.getElementById('bId').value = '';
    document.getElementById('bModalTitle').textContent = 'Register Beneficiary';
    document.getElementById('bName').value = '';
    document.getElementById('bPhone').value = '';
    document.getElementById('bEmail').value = '';
    document.getElementById('bAddress').value = '';
    new bootstrap.Modal(document.getElementById('bModal')).show();
  }

  function editBeneficiary(id) {
    const b = window._beneficiaryMap && window._beneficiaryMap[id];
    if (!b) return;
    document.getElementById('bId').value = b.beneficiaryId;
    document.getElementById('bModalTitle').textContent = 'Edit Beneficiary';
    document.getElementById('bName').value = b.fullName;
    document.getElementById('bPhone').value = b.phoneNumber;
    document.getElementById('bEmail').value = b.emailAddress || '';
    document.getElementById('bAddress').value = b.residentialAddress;
    new bootstrap.Modal(document.getElementById('bModal')).show();
  }

  async function saveBeneficiary() {
    const id = document.getElementById('bId').value;
    const body = {
      fullName: document.getElementById('bName').value,
      phoneNumber: document.getElementById('bPhone').value,
      emailAddress: document.getElementById('bEmail').value || null,
      residentialAddress: document.getElementById('bAddress').value
    };
    try {
      if (id) await api('PUT', `/beneficiaries/${id}`, body);
      else    await api('POST', '/beneficiaries', body);
      bootstrap.Modal.getInstance(document.getElementById('bModal')).hide();
      showSuccess('Beneficiary saved!');
      loadBeneficiaries();
    } catch(e) { showError(e.message); }
  }

  async function deactivate(id) {
    if (!confirm('Deactivate this beneficiary?')) return;
    try {
      await api('PATCH', `/beneficiaries/${id}/deactivate`);
      showSuccess('Beneficiary deactivated');
      loadBeneficiaries();
    } catch(e) { showError(e.message); }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    loadBeneficiaries();
  }

  loadBeneficiaries();
</script>
</body>
</html>
