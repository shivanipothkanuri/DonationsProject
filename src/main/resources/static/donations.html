<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Donations — CharityAid</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<nav id="mainNav"></nav>
<div class="container py-4">
  <h4 class="fw-bold mb-3">💳 My Donation History</h4>
  <!-- Filters -->
  <div class="card border-0 shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label small">From Date</label>
          <input type="date" class="form-control" id="filterFrom">
        </div>
        <div class="col-md-3">
          <label class="form-label small">To Date</label>
          <input type="date" class="form-control" id="filterTo">
        </div>
        <div class="col-md-2">
          <label class="form-label small">Campaign ID</label>
          <input type="number" class="form-control" id="filterCampaign" placeholder="Any">
        </div>
        <div class="col-md-auto">
          <button class="btn btn-success" onclick="loadDonations()">Filter</button>
          <button class="btn btn-outline-secondary ms-1" onclick="clearFilters()">Clear</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Summary stats -->
  <div class="row g-3 mb-3" id="stats"></div>
  <!-- Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-success">
            <tr>
              <th>Transaction ID</th><th>Campaign</th><th>Type</th>
              <th>Amount</th><th>Payment</th><th>Date & Time</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="donationRows"><tr><td colspan="7" class="text-center text-muted p-4">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <div id="pagination" class="mt-3 d-flex justify-content-center"></div>
</div>

<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  requireAuth();
  if (getRole() !== 'DONOR') window.location.href = '/dashboard.html';
  buildNav('mainNav');

  let currentPage = 0;

  async function loadDonations(page = 0) {
    currentPage = page;
    const from = document.getElementById('filterFrom').value;
    const to   = document.getElementById('filterTo').value;
    const cid  = document.getElementById('filterCampaign').value;
    let url = `/donations/my?page=${page}&size=10`;
    if (from && to) url += `&from=${from}T00:00:00&to=${to}T23:59:59`;
    if (cid)        url += `&campaignId=${cid}`;
    try {
      const res = await api('GET', url);
      const data = res.data;
      renderTable(data.content || []);
      renderPagination(data.totalPages, page);
      renderStats(data.content || [], data.totalElements);
    } catch(e) { showError(e.message); }
  }

  function renderStats(items, total) {
    const monetary = items.filter(d => d.donationType === 'MONETARY');
    const totalAmt = monetary.reduce((s, d) => s + (d.donationAmount || 0), 0);
    document.getElementById('stats').innerHTML = `
      <div class="col-md-3"><div class="card border-0 bg-success text-white text-center p-3">
        <div class="fs-3 fw-bold">${total}</div><div>Total Donations</div></div></div>
      <div class="col-md-3"><div class="card border-0 bg-primary text-white text-center p-3">
        <div class="fs-3 fw-bold">$${totalAmt.toFixed(2)}</div><div>Monetary (this page)</div></div></div>
      <div class="col-md-3"><div class="card border-0 bg-info text-white text-center p-3">
        <div class="fs-3 fw-bold">${items.filter(d=>d.donationType==='IN_KIND').length}</div><div>In-Kind (this page)</div></div></div>`;
  }

  function renderTable(rows) {
    if (!rows.length) {
      document.getElementById('donationRows').innerHTML = '<tr><td colspan="7" class="text-center text-muted p-4">No donations found.</td></tr>';
      return;
    }
    document.getElementById('donationRows').innerHTML = rows.map(d => `
      <tr>
        <td><code>${d.transactionId}</code></td>
        <td>${d.campaignTitle}</td>
        <td><span class="badge ${d.donationType==='MONETARY'?'bg-success':'bg-info'}">${d.donationType.replace('_',' ')}</span></td>
        <td>${d.donationAmount ? '$'+Number(d.donationAmount).toFixed(2) : '—'}</td>
        <td>${d.paymentMethod ? d.paymentMethod.replace('_',' ') : '—'}</td>
        <td>${new Date(d.donationDate).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' })}</td>
        <td>
          <button class="btn btn-sm btn-outline-primary" onclick="downloadReceipt(${d.donationId}, '${d.transactionId}')">
            Download Receipt
          </button>
        </td>
      </tr>`).join('');
  }

  async function downloadReceipt(donationId, transactionId) {
    try {
      const token = getToken();
      const res = await fetch(`/api/donations/${donationId}/receipt`, {
        method: 'GET',
        headers: token ? { Authorization: `Bearer ${token}` } : {}
      });

      if (res.status === 401) {
        logout();
        return;
      }

      if (!res.ok) {
        const errorText = await res.text();
        throw new Error(errorText || 'Failed to download receipt');
      }

      const blob = await res.blob();
      const fileName = `receipt-${transactionId || donationId}.pdf`;
      const blobUrl = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.URL.revokeObjectURL(blobUrl);
      showSuccess('Receipt download started');
    } catch (e) {
      showError(e.message || 'Unable to download receipt');
    }
  }

  function renderPagination(total, current) {
    if (total <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    let html = '<nav><ul class="pagination">';
    for (let i = 0; i < total; i++) {
      html += `<li class="page-item${i===current?' active':''}">
        <button class="page-link" onclick="loadDonations(${i})">${i+1}</button></li>`;
    }
    document.getElementById('pagination').innerHTML = html + '</ul></nav>';
  }

  function clearFilters() {
    document.getElementById('filterFrom').value = '';
    document.getElementById('filterTo').value = '';
    document.getElementById('filterCampaign').value = '';
    loadDonations();
  }

  loadDonations();
</script>
</body>
</html>
