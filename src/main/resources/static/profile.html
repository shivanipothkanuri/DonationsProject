<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Profile – CAMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; color: #0d6efd !important; }
    .page-header { background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%); color: #fff; padding: 2.5rem 0; margin-bottom: 2rem; }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; color: #fff; flex-shrink: 0;
    }
    .role-badge { font-size: 0.85rem; padding: 0.4rem 0.9rem; }
    .info-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; margin-bottom: 0.2rem; }
    .info-value { font-size: 1.05rem; font-weight: 500; }
    #toast-container { position: fixed; bottom: 1.5rem; end: 1.5rem; z-index: 9999; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm" id="mainNav"></nav>

<!-- Page Header -->
<div class="page-header">
  <div class="container">
    <div class="d-flex align-items-center gap-4">
      <div class="avatar-circle" id="avatarCircle"><i class="bi bi-person-fill"></i></div>
      <div>
        <h2 class="mb-1 fw-bold" id="headerName">Loading…</h2>
        <span class="badge bg-white text-dark role-badge" id="headerRole"></span>
        <p class="mb-0 mt-1 text-white-50 small" id="headerEmail"></p>
      </div>
    </div>
  </div>
</div>

<div class="container mb-5">
  <div class="row g-4">

    <!-- Profile details card -->
    <div class="col-md-5">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-white fw-semibold border-0 pt-3">
          <i class="bi bi-person-lines-fill me-2 text-primary"></i>Account Details
          <span class="badge ms-2" id="statusBadge"></span>
        </div>
        <div class="card-body">
          <div id="profileDetails">
            <div class="text-center py-4 text-muted">Loading profile…</div>
          </div>
        </div>
        <div class="card-footer bg-white border-0 pb-3">
          <button class="btn btn-outline-primary w-100" data-bs-toggle="modal" data-bs-target="#editProfileModal">
            <i class="bi bi-pencil me-2"></i>Edit Profile
          </button>
        </div>
      </div>
    </div>

    <!-- Change password card -->
    <div class="col-md-7">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold border-0 pt-3">
          <i class="bi bi-shield-lock me-2 text-warning"></i>Change Password
        </div>
        <div class="card-body">
          <form id="changePasswordForm" novalidate>
            <div class="mb-3">
              <label class="form-label">Current Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" class="form-control" id="currentPassword" placeholder="Enter current password" />
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('currentPassword', 'toggleCurrent')"><i class="bi bi-eye" id="toggleCurrent"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">New Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" class="form-control" id="newPassword" placeholder="Min. 8 characters" />
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('newPassword', 'toggleNew')"><i class="bi bi-eye" id="toggleNew"></i></button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm New Password <span class="text-danger">*</span></label>
              <div class="input-group">
                <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat new password" />
                <button class="btn btn-outline-secondary" type="button"
                        onclick="togglePwd('confirmPassword', 'toggleConfirm')"><i class="bi bi-eye" id="toggleConfirm"></i></button>
              </div>
            </div>
            <button type="button" class="btn btn-warning w-100" onclick="changePassword()">
              <i class="bi bi-shield-check me-2"></i>Update Password
            </button>
          </form>
        </div>
      </div>

      <!-- Activity summary -->
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-semibold border-0 pt-3">
          <i class="bi bi-bar-chart-line me-2 text-info"></i>Account Summary
        </div>
        <div class="card-body" id="accountSummary">
          <div class="text-muted small">Loading…</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Edit Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editProfileForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="editFullName" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Phone Number</label>
            <input type="tel" class="form-control" id="editPhone" placeholder="+1 555 000 0000" />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Email Address</label>
            <input type="email" class="form-control" id="editEmail" disabled />
            <div class="form-text">Email cannot be changed.</div>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="editNotificationsEnabled" checked>
            <label class="form-check-label" for="editNotificationsEnabled">Enable email notifications</label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveProfile()">
          <i class="bi bi-check-lg me-1"></i>Save Changes
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index:9999"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  // ── Auth guard ──────────────────────────────────────────────────────────────
  (function() {
    if (!getCurrentUser()) { window.location.href = '/index.html'; }
  })();

  buildNav('mainNav');

  let profileData = null;

  // ── Load own profile ────────────────────────────────────────────────────────
  async function loadProfile() {
    try {
      const res = await api('/api/users/me');
      if (!res.ok) { showToast('Could not load profile', 'danger'); return; }
      const body = await res.json();
      profileData = body.data;
      renderProfile(profileData);
      loadSummary(profileData);
    } catch (e) {
      showToast('Network error loading profile', 'danger');
    }
  }

  function renderProfile(u) {
    // Header
    const initials = (u.fullName || '?').charAt(0).toUpperCase();
    document.getElementById('avatarCircle').textContent = initials;
    document.getElementById('headerName').textContent = u.fullName;
    document.getElementById('headerEmail').textContent = u.emailAddress;

    const roleLabel = (u.userRole || '').replace('_', ' ');
    const roleClass = { ADMINISTRATOR:'danger', LEADERSHIP:'info', CASE_MANAGER:'warning', STAFF:'primary', DONOR:'secondary' }[u.userRole] || 'secondary';
    document.getElementById('headerRole').className = `badge bg-${roleClass} role-badge`;
    document.getElementById('headerRole').textContent = roleLabel;

    const statusClass = { ACTIVE:'success', INACTIVE:'secondary', SUSPENDED:'warning', LOCKED:'danger' }[u.accountStatus] || 'secondary';
    const statusBadge = document.getElementById('statusBadge');
    statusBadge.className = `badge bg-${statusClass}`;
    statusBadge.textContent = u.accountStatus;

    // Details list
    const joined = u.createdDate ? new Date(u.createdDate).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }) : '–';
    const lastLogin = u.lastLogin ? new Date(u.lastLogin).toLocaleString() : 'Never';
    document.getElementById('profileDetails').innerHTML = `
      <div class="mb-3">
        <div class="info-label">Full Name</div>
        <div class="info-value">${escHtml(u.fullName)}</div>
      </div>
      <div class="mb-3">
        <div class="info-label">Email Address</div>
        <div class="info-value">${escHtml(u.emailAddress)}</div>
      </div>
      <div class="mb-3">
        <div class="info-label">Phone Number</div>
        <div class="info-value">${escHtml(u.phoneNumber || '–')}</div>
      </div>
      <div class="mb-3">
        <div class="info-label">Member Since</div>
        <div class="info-value">${joined}</div>
      </div>
      <div class="mb-3">
        <div class="info-label">Last Login</div>
        <div class="info-value text-muted small">${lastLogin}</div>
      </div>`;

    // Pre-fill edit modal
    document.getElementById('editFullName').value = u.fullName || '';
    document.getElementById('editPhone').value = u.phoneNumber || '';
    document.getElementById('editEmail').value = u.emailAddress || '';
    document.getElementById('editNotificationsEnabled').checked = !!u.notificationsEnabled;
  }

  // ── Load account summary (donor: donations; staff: aid requests) ────────────
  async function loadSummary(u) {
    const container = document.getElementById('accountSummary');
    try {
      if (u.userRole === 'DONOR') {
        const res = await api('/api/donations/my?page=0&size=100');
        if (!res.ok) { container.innerHTML = '<p class="text-muted small">No data available.</p>'; return; }
        const body = await res.json();
        const donations = Array.isArray(body.data) ? body.data : (body.data?.content ?? []);
        const monetary = donations.filter(d => d.donationType === 'MONETARY');
        const total = monetary.reduce((s, d) => s + (d.amount || 0), 0);
        container.innerHTML = `
          <div class="row g-3">
            <div class="col-6">
              <div class="text-center p-3 border rounded">
                <div class="fs-3 fw-bold text-primary">${donations.length}</div>
                <div class="small text-muted">Total Donations</div>
              </div>
            </div>
            <div class="col-6">
              <div class="text-center p-3 border rounded">
                <div class="fs-3 fw-bold text-success">$${total.toFixed(2)}</div>
                <div class="small text-muted">Money Donated</div>
              </div>
            </div>
          </div>
          <p class="mt-3 mb-0 small text-muted">
            <a href="/donations.html">View full donation history <i class="bi bi-arrow-right"></i></a>
          </p>
          <hr>
          <button class="btn btn-outline-secondary btn-sm" onclick="exportMyData()"><i class="bi bi-download me-1"></i>Export My Data</button>`;
      } else {
        container.innerHTML = `
          <ul class="list-unstyled mb-0">
            <li class="mb-2"><a href="/campaigns.html" class="text-decoration-none"><i class="bi bi-megaphone me-2 text-primary"></i>Campaigns</a></li>
            <li class="mb-2"><a href="/aid-requests.html" class="text-decoration-none"><i class="bi bi-clipboard-check me-2 text-info"></i>Aid Requests</a></li>
            <li class="mb-2"><a href="/beneficiaries.html" class="text-decoration-none"><i class="bi bi-people me-2 text-success"></i>Beneficiaries</a></li>
            <li><a href="/inventory.html" class="text-decoration-none"><i class="bi bi-box-seam me-2 text-warning"></i>Inventory</a></li>
          </ul>`;
      }
    } catch (e) {
      container.innerHTML = '<p class="text-muted small">Could not load summary.</p>';
    }
  }

  // ── Save profile ────────────────────────────────────────────────────────────
  async function saveProfile() {
    const fullName = document.getElementById('editFullName').value.trim();
    const phoneNumber = document.getElementById('editPhone').value.trim();
    const notificationsEnabled = document.getElementById('editNotificationsEnabled').checked;
    if (!fullName) { showToast('Full name is required.', 'warning'); return; }

    try {
      const res = await api('/api/users/me', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, phoneNumber: phoneNumber || null, notificationsEnabled })
      });
      const body = await res.json();
      if (res.ok) {
        showToast('Profile updated successfully.', 'success');
        bootstrap.Modal.getInstance(document.getElementById('editProfileModal')).hide();
        loadProfile();
      } else {
        showToast(body.message || 'Failed to update profile', 'danger');
      }
    } catch (e) { showToast('Network error', 'danger'); }
  }

  async function exportMyData() {
    try {
      const res = await api('/api/users/me/export');
      if (!res.ok) {
        showToast('Export failed', 'danger');
        return;
      }
      const text = await res.text();
      const blob = new Blob([text], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-data-export.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast('Data export downloaded', 'success');
    } catch (e) {
      showToast('Export failed', 'danger');
    }
  }

  // ── Change password ─────────────────────────────────────────────────────────
  async function changePassword() {
    const currentPassword = document.getElementById('currentPassword').value;
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!currentPassword || !newPassword || !confirmPassword) {
      showToast('All password fields are required.', 'warning'); return;
    }
    if (newPassword.length < 8) {
      showToast('New password must be at least 8 characters.', 'warning'); return;
    }
    if (newPassword !== confirmPassword) {
      showToast('New passwords do not match.', 'warning'); return;
    }

    try {
      const res = await api('/api/users/me/password', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword, newPassword })
      });
      const body = await res.json();
      if (res.ok) {
        showToast('Password changed. Please log in again.', 'success');
        document.getElementById('changePasswordForm').reset();
        setTimeout(() => {
          localStorage.removeItem('cams_token');
          localStorage.removeItem('cams_user');
          window.location.href = '/index.html';
        }, 2000);
      } else {
        showToast(body.message || 'Failed to change password', 'danger');
      }
    } catch (e) { showToast('Network error', 'danger'); }
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function togglePwd(inputId, iconId) {
    const inp = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }

  loadProfile();
</script>
</body>
</html>
